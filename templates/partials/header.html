{% load static %}
<header class="navbar">
    <a href="{% url 'home' %}" class="logo">
        <div class="logo-icon" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
            <img src="{% static 'images/icon.png' %}" alt="JMD Logo" style="width: 100%; height: 100%; object-fit: contain;">
        </div>
        <span>JMD</span>
    </a>

    <nav class="nav-links" id="navLinks">
        {% if request.resolver_match.url_name == 'home' %}
            <a href="#hero-section" class="active">Home</a> 
            <a href="#services">Services</a>
            <a href="#why-choose-us">Why Us</a>
            <a href="#team-section">Team</a>
            <a href="#contact-footer">Contact</a>   
        {% else %}
            <a href="{% url 'home' %}#hero-section">Home</a>
            <a href="{% url 'home' %}#services">Services</a>
            <a href="{% url 'home' %}#why-choose-us">Why Us</a>
            <a href="{% url 'home' %}#team-section">Team</a>
            <a href="{% url 'home' %}#contact-footer">Contact</a>
        {% endif %}
        
        <a href="{% url 'careers' %}" class="{% if request.resolver_match.url_name == 'careers' %}active{% endif %}">Careers</a>
    </nav>

    <div class="nav-actions">
        <a href="{% url 'home' %}#contact-footer" class="btn-primary btn-nav">
            Get A Quote <i class="fa-solid fa-arrow-up-right-from-square"></i>
        </a>
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle Navigation">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>
</header>
